version = "3.8.6"
runner.dialect = scala3

maxColumn = 120

# Fold: collapse lines that fit within maxColumn
newlines.source = fold

# Align settings
align.preset = none
align.openParenCallSite = false
align.openParenDefnSite = false

# Indentation
indent.main = 2
indent.callSite = 2
indent.defnSite = 2

# Don't force splits on short method calls
newlines.avoidForSimpleOverflow = [tooLong, punct, slc]

optIn.breakChainOnFirstMethodDot = false
includeCurlyBraceInSelectChains = true

# Rewrite rules
rewrite.rules = [SortModifiers, PreferCurlyFors, RedundantParens]
rewrite.sortModifiers.preset = styleGuide

# Spaces
spaces.inImportCurlyBraces = false
spaces.beforeContextBoundColon = Never

rewrite.trailingCommas.style = never
